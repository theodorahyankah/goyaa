name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run prod

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.yml,.docker/nginx.conf,.env.example"
          target: "~/goya"

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd ~/goya
            
            # Detect first deployment
            FIRST_DEPLOY=false
            if [ ! -f .env ]; then
              FIRST_DEPLOY=true
              cp .env.example .env
              echo "DB_HOST=db" >> .env
              echo "REDIS_HOST=redis" >> .env
            fi

            # Login to GHCR
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update the docker-compose.yml for production (replace build block with image)
            sed -i '/build:/d' docker-compose.yml
            sed -i '/context: ./d' docker-compose.yml
            sed -i '/dockerfile: Dockerfile/d' docker-compose.yml
            # Add image line after 'app:' with correct indentation
            sed -i '/app:/a \    image: ghcr.io/${{ github.repository }}/app:latest' docker-compose.yml

            docker compose pull
            docker compose up -d --remove-orphans
            
            # Run commands based on deployment state
            if [ "$FIRST_DEPLOY" = true ]; then
              docker compose exec -T app php artisan key:generate
              docker compose exec -T app php artisan migrate --seed --force
            else
              docker compose exec -T app php artisan migrate --force
            fi
            
            # Run optimization for Laravel
            docker compose exec -T app php artisan optimize
