name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run prod

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.yml,.docker/nginx.conf,.env.example,scripts/update-env.sh"
          target: "~/goya"

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd ~/goya
            chmod +x scripts/update-env.sh
            
            # Ensure .env exists
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            
            # Update environment variables
            ./scripts/update-env.sh DB_CONNECTION mysql
            ./scripts/update-env.sh DB_HOST db
            ./scripts/update-env.sh DB_PORT 3306
            ./scripts/update-env.sh DB_DATABASE laravel
            ./scripts/update-env.sh DB_USERNAME laravel
            ./scripts/update-env.sh DB_PASSWORD secret
            ./scripts/update-env.sh REDIS_HOST redis

            # Ensure APP_KEY exists
            if ! grep -q "APP_KEY=base64:" .env; then
              echo "Generating new APP_KEY..."
              # We'll generate it temporarily and then use artisan to do it properly inside container
              echo "APP_KEY=" >> .env
            fi

            # Login to GHCR
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update the docker-compose.yml for production (replace build block with image)
            # Remove build section for the app service
            sed -i '/build:/,/dockerfile: Dockerfile/d' docker-compose.yml
            # Add image line after 'app:' with correct indentation
            # Check if image line already exists to avoid duplication
            if ! grep -q "image: ghcr.io/${{ github.repository }}/app:latest" docker-compose.yml; then
              sed -i '/app:/a \    image: ghcr.io/${{ github.repository }}/app:latest' docker-compose.yml
            fi

            docker compose pull
            docker compose up -d --remove-orphans
            
            # Always ensure key is generated if missing
            if ! grep -q "APP_KEY=base64:" .env || [ "$(grep "APP_KEY=" .env | cut -d'=' -f2)" = "" ]; then
               docker compose exec -T app php artisan key:generate --force
            fi

            # Run migrations
            docker compose exec -T app php artisan migrate --force
            
            # Run optimization for Laravel
            docker compose exec -T app php artisan optimize
