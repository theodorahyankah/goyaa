name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deployment/docker-compose.prod.yml,deployment/nginx.conf,.env.example,scripts/deploy.sh,scripts/update-env.sh"
          target: "/root/goya"

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /root/goya
            # Move production files to root of app directory
            [ -f deployment/docker-compose.prod.yml ] && sudo cp deployment/docker-compose.prod.yml docker-compose.yml
            [ -f deployment/nginx.conf ] && sudo cp deployment/nginx.conf .
            
            sudo chmod +x scripts/deploy.sh
            
            # Login to GHCR
            echo "${{ secrets.DOCKER_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update the image placeholder in docker-compose.yml
            sudo sed -i 's|ghcr.io/${{ github.repository }}/app:latest|ghcr.io/${{ github.repository }}/app:latest|g' docker-compose.yml

            # Execute the deployment script
            sudo ./scripts/deploy.sh /root/goya
