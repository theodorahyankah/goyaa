name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/app:latest

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deployment/docker-compose.yml,deployment/nginx.conf,.env.example,scripts/deploy.sh,scripts/update-env.sh"
          target: "/root/goya"

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /root/goya
            # Move files from subdirectories to root of app directory if scp put them there
            [ -f deployment/docker-compose.yml ] && sudo mv deployment/docker-compose.yml .
            [ -f deployment/nginx.conf ] && sudo mv deployment/nginx.conf .
            
            sudo chmod +x scripts/deploy.sh
            
            # Login to GHCR
            echo "${{ secrets.DOCKER_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Prepare docker-compose.yml for production
            sudo sed -i '/build:/,/dockerfile: deployment\/Dockerfile/d' docker-compose.yml
            if ! grep -q "image: ghcr.io/${{ github.repository }}/app:latest" docker-compose.yml; then
              sudo sed -i '/app:/a \    image: ghcr.io/${{ github.repository }}/app:latest' docker-compose.yml
            fi

            # Execute the deployment script
            sudo ./scripts/deploy.sh /root/goya
