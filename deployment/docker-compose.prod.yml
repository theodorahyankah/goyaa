services:
  # PHP Application
  app:
    image: REPOSITORY_PLACEHOLDER/app:latest
    container_name: goya-app
    restart: always
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - goya-www-data:/var/www
      - ./.env:/var/www/.env
    depends_on:
      - db
      - redis
    networks:
      - goya-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: goya-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - goya-www-data:/var/www
    depends_on:
      - app
    networks:
      - goya-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: goya-db
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - goya-db-data:/var/lib/mysql
    networks:
      - goya-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: goya-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - goya-network

  # Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: goya-portainer
    restart: always
    command: --admin-password "$$2y$$10$$9fbJ/JU1kGaPe1rY2aYX8unFUfHZcZhD44UfouU9yIv7.VsIJSUNy"
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - goya-portainer-data:/data
    networks:
      - goya-network

networks:
  goya-network:
    driver: bridge

volumes:
  goya-db-data:
    driver: local
  goya-portainer-data:
    driver: local
  goya-www-data:
    driver: local
